name: Build Kernel
on:
  workflow_dispatch:
    inputs:
      select_device:
        description: 'Select device:'
        required: true
        type: choice
        options:
        - 'lancelot'
        - 'merlin'

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-24.04
    env:
      DEVICE: ${{ github.event.inputs.select_device }}
      # Pastikan variabel ini ada di config.env atau didefinisikan di sini
      KERNEL_ARCH: arm64
      KERNEL_IMAGE_NAME: Image.gz-dtb
    steps:
    - uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        # Mengambil variabel dari config.env jika ada
        if [ -f config.env ]; then
          grep -v -E "^#|^\n" config.env | sed 's/ #.*//; s/#.*//' >> $GITHUB_ENV
        fi
        echo "BUILD_TIME=$(TZ=Asia/Jakarta date "+%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Setup kernel build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses6 libncurses-dev libsdl1.2-dev libssl-dev libwxgtk3.2-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Download Clang
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        # Gunakan link clang yang sesuai di config.env kamu
        git clone ${{ env.CLANG_SOURCE }} -b ${{ env.CLANG_BRANCH }} clang --depth=1

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1

    - name: Setup Configuration (Manual Hook Mode)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # Inject CONFIG untuk Manual Mode ke defconfig
        # Kita tidak menggunakan KPROBES karena sudah pakai hook manual (.c)
        echo "CONFIG_KSU=y" >> arch/${{ env.KERNEL_ARCH }}/configs/${{ env.DEVICE }}_defconfig
        echo "CONFIG_KSU_NEXT=y" >> arch/${{ env.KERNEL_ARCH }}/configs/${{ env.DEVICE }}_defconfig
        echo "# CONFIG_KPROBES is not set" >> arch/${{ env.KERNEL_ARCH }}/configs/${{ env.DEVICE }}_defconfig
        echo "# CONFIG_KSU_KPROBE_HOOKS is not set" >> arch/${{ env.KERNEL_ARCH }}/configs/${{ env.DEVICE }}_defconfig
        
        # Tambahan OverlayFS untuk modul KSU
        echo "CONFIG_OVERLAY_FS=y" >> arch/${{ env.KERNEL_ARCH }}/configs/${{ env.DEVICE }}_defconfig
        
        # Fix untuk MediaTek (Werror sering bikin build stop)
        echo "CONFIG_CC_WERROR=n" >> arch/${{ env.KERNEL_ARCH }}/configs/${{ env.DEVICE }}_defconfig

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$PATH
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=${{ github.actor }}
        
        # Build defconfig
        make -j$(nproc --all) O=out ARCH=${{ env.KERNEL_ARCH }} CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- ${{ env.DEVICE }}_defconfig
        
        # Build Kernel
        make -j$(nproc --all) O=out ARCH=${{ env.KERNEL_ARCH }} \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-android- \
          CROSS_COMPILE_ARM32=arm-linux-androideabi- \
          LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip

    - name: Check output
      run: |
       if [ -f $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out/arch/${{ env.KERNEL_ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
           echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
       else
           echo "Kernel image not found!"
           exit 1
       fi

    - name: Upload Kernel Image
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/android-kernel/out/arch/${{ env.KERNEL_ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}
